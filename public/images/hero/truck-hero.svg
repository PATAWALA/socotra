<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="truckGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#166534;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:0.1" />
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#truckGrad)" rx="20"/>
  <!-- Route -->
  <line x1="0" y1="380" x2="800" y2="380" stroke="#166534" stroke-width="2" stroke-dasharray="20,10"/>
  <!-- Camion simplifié -->
  <g transform="translate(150, 200)">
    <!-- Remorque -->
    <rect x="200" y="20" width="300" height="150" rx="10" fill="#166534" opacity="0.8"/>
    <text x="350" y="100" text-anchor="middle" fill="white" font-size="20" font-weight="bold" font-family="Arial">SOCOTRA</text>
    <!-- Cabine -->
    <rect x="120" y="60" width="100" height="110" rx="10" fill="#15803d"/>
    <rect x="130" y="70" width="40" height="30" rx="5" fill="#86efac" opacity="0.5"/>
    <!-- Roues -->
    <circle cx="170" cy="180" r="25" fill="#1a1a1a"/>
    <circle cx="170" cy="180" r="15" fill="#333"/>
    <circle cx="350" cy="180" r="25" fill="#1a1a1a"/>
    <circle cx="350" cy="180" r="15" fill="#333"/>
    <circle cx="450" cy="180" r="25" fill="#1a1a1a"/>
    <circle cx="450" cy="180" r="15" fill="#333"/>
  </g>
</svg>